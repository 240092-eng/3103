<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Pink Chat</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      color: #ff4d88;
    }

    button {
      background: #ff4d88;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    #messages {
      max-height: 200px;
      overflow-y: auto;
      text-align: left;
      margin-bottom: 10px;
    }

    .msg {
      background: #ffe6f0;
      padding: 8px;
      border-radius: 10px;
      margin-bottom: 5px;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💖 Pink Chat</h1>

  <button id="login">Войти через Google</button>
  <button id="logout" style="display:none;">Выйти</button>

  <div id="form" style="display:none;">
    <div id="messages"></div>

    <input id="message" placeholder="Введите сообщение" />
    <input type="file" id="image" />

    <button id="send">Отправить</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  import { 
    getAuth, 
    signInWithPopup, 
    GoogleAuthProvider, 
    signOut,
    onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  import { 
    getFirestore, 
    collection, 
    addDoc,
    onSnapshot,
    query,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  import {
    getStorage,
    ref,
    uploadBytes,
    getDownloadURL
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB7VHLS8mZGA2ibzgdjP9Rh_CYbSCOXy4E",
    authDomain: "project-1058159525962641435.firebaseapp.com",
    projectId: "project-1058159525962641435",
    storageBucket: "project-1058159525962641435.appspot.com", // ✅ исправлено
    messagingSenderId: "439272881011",
    appId: "1:439272881011:web:0a311dcd8356483941a306",
    measurementId: "G-JJ6FG1MJDJ"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  const provider = new GoogleAuthProvider();

  const loginBtn = document.getElementById("login");
  const logoutBtn = document.getElementById("logout");
  const form = document.getElementById("form");
  const messagesDiv = document.getElementById("messages");

  loginBtn.onclick = async () => {
    await signInWithPopup(auth, provider);
  };

  logoutBtn.onclick = async () => {
    await signOut(auth);
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginBtn.style.display = "none";
      logoutBtn.style.display = "block";
      form.style.display = "block";
    } else {
      loginBtn.style.display = "block";
      logoutBtn.style.display = "none";
      form.style.display = "none";
    }
  });

  document.getElementById("send").onclick = async () => {
    const text = document.getElementById("message").value;
    const file = document.getElementById("image").files[0];

    let imageUrl = "";

    if (file) {
      const storageRef = ref(storage, "images/" + Date.now());
      await uploadBytes(storageRef, file);
      imageUrl = await getDownloadURL(storageRef);
    }

    await addDoc(collection(db, "messages"), {
      text,
      image: imageUrl,
      user: auth.currentUser.email,
      timestamp: Date.now()
    });

    document.getElementById("message").value = "";
    document.getElementById("image").value = "";
  };

  const q = query(collection(db, "messages"), orderBy("timestamp"));

  onSnapshot(q, (snapshot) => {
    messagesDiv.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const div = document.createElement("div");
      div.className = "msg";

      div.innerHTML = `
        <b>${data.user}</b><br>
        ${data.text || ""}
        ${data.image ? `<img src="${data.image}"/>` : ""}
      `;

      messagesDiv.appendChild(div);
    });
  });
</script>

</body>
</html>
